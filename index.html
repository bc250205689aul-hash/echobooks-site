<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EchoBooks - Login</title>
  
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f8f9fa;
      text-align: center;
      padding: 40px;
    }
    h1 { color: #2563eb; }
    .btn {
      display: block;
      width: 320px;
      margin: 12px auto;
      padding: 15px;
      font-size: 17px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      color: white;
    }
    .google { background: #DB4437; }
    .twitter { background: #1DA1F2; }
    .email { background: #2563eb; }
    input {
      display: block;
      width: 300px;
      margin: 8px auto;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <h1>📖 EchoBooks</h1>
  <p>Sign in to your account</p>

  <!-- Email/Password Form -->
  <div>
    <input type="email" id="email" placeholder="Enter Email" />
    <input type="password" id="password" placeholder="Enter Password" />
    <button onclick="signUp()" class="btn email">Sign Up with Email</button>
    <button onclick="loginWithEmail()" class="btn email">Login with Email</button>
  </div>

  <hr style="margin: 30px auto; width: 300px;">

  <!-- Social Logins -->
  <button onclick="googleLogin()" class="btn google">🔵 Login with Google</button>
  <button onclick="twitterLogin()" class="btn twitter">🐦 Login with Twitter</button>

  <p id="status" style="margin-top: 30px; font-weight: bold;"></p>

  <script>
    // ================== PASTE YOUR CONFIG HERE ==================
    const firebaseConfig = {
      apiKey: "AIzaSyAEytklQ_refpkStisgVb6Bv7wZrHW7bMg",
      authDomain: "echobooks-dc31b.firebaseapp.com",
      projectId: "echobooks-dc31b",
      storageBucket: "echobooks-dc31b.firebasestorage.app",
      messagingSenderId: "565405056470",
      appId: "1:565405056470:web:ab11970ea2c16452db3877"
    };
    // =========================================================

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Email/Password Login
    function loginWithEmail() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      
      auth.signInWithEmailAndPassword(email, password)
        .then(() => document.getElementById("status").innerHTML = "✅ Login Successful!")
        .catch(error => document.getElementById("status").innerHTML = "❌ " + error.message);
    }

    // Sign Up with Email
    function signUp() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      
      auth.createUserWithEmailAndPassword(email, password)
        .then(() => document.getElementById("status").innerHTML = "✅ Account Created Successfully!")
        .catch(error => document.getElementById("status").innerHTML = "❌ " + error.message);
    }

    // Google Login
    function googleLogin() {
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithPopup(provider)
        .then(() => document.getElementById("status").innerHTML = "✅ Google Login Successful!")
        .catch(error => document.getElementById("status").innerHTML = "❌ " + error.message);
    }

    // Twitter Login
    function twitterLogin() {
      const provider = new firebase.auth.TwitterAuthProvider();
      auth.signInWithPopup(provider)
        .then(() => document.getElementById("status").innerHTML = "✅ Twitter Login Successful!")
        .catch(error => document.getElementById("status").innerHTML = "❌ " + error.message);
    }
  </script>
</body>
</html>
