<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EchoBooks - Books That Change Lives</title>
  
  <!-- Firebase Scripts -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>📖 EchoBooks</h1>
    <p>Welcome! Sign in to access community and audiobook features.</p>

    <div class="login-box">
      <button onclick="googleLogin()" class="btn google">Login with Google</button>
      <button onclick="appleLogin()" class="btn apple">Login with Apple</button>
      <button onclick="microsoftLogin()" class="btn microsoft">Login with Microsoft</button>
      <button onclick="twitterLogin()" class="btn twitter">Login with Twitter</button>
    </div>

    <p id="status"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
