<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EchoBooks - Books That Change Lives</title>
  
  <!-- Firebase Scripts -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  
  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 50px; }
    button {
      padding: 12px 20px;
      margin: 10px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .google { background: #DB4437; color: white; }
    .apple  { background: #000; color: white; }
    .microsoft { background: #00A4EF; color: white; }
    .twitter { background: #1DA1F2; color: white; }
  </style>
</head>
<body>

  <h1>Welcome to EchoBooks</h1>
  <p>Sign in to upload books and use Audiobook feature</p>

  <!-- Login Buttons Go Here -->
  <div>
    <button class="google" onclick="googleLogin()">Login with Google</button><br>
    <button class="apple" onclick="appleLogin()">Login with Apple</button><br>
    <button class="microsoft" onclick="microsoftLogin()">Login with Microsoft</button><br>
    <button class="twitter" onclick="twitterLogin()">Login with Twitter</button><br>
  </div>

  <p id="user-info"></p>

  <script src="script.js"></script>
</body>
</html>
