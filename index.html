<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EchoBooks • Read • Listen • Connect</title>
  
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  
  <style>
    :root { --primary: #6366f1; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background:#f8fafc; color:#1e2937; }
    header { background:white; padding:1rem 5%; box-shadow:0 2px 15px rgba(0,0,0,0.1); position:sticky; top:0; z-index:100; }
    .nav { max-width:1280px; margin:0 auto; display:flex; justify-content:space-between; align-items:center; }
    .logo { font-size:28px; font-weight:800; color:var(--primary); }
    
    .hero, .card { background:white; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,0.1); padding:24px; margin:20px; }
    button {
      padding:14px 28px;
      border:none;
      border-radius:12px;
      font-size:16px;
      cursor:pointer;
      margin:5px;
    }
    .btn-primary { background:var(--primary); color:white; }
  </style>
</head>
<body>

  <header>
    <div class="nav">
      <div class="logo">EchoBooks</div>
      <div id="user-info" style="display:none;">
        <span id="user-name"></span>
        <button onclick="logout()" style="background:#ef4444;color:white;margin-left:15px;">Logout</button>
      </div>
    </div>
  </header>

  <!-- Main Dashboard -->
  <div id="main-screen" style="max-width:1280px; margin:0 auto; padding:20px;">
    <h2>Welcome back, <span id="welcome-name"></span> 👋</h2>

    <div class="card">
      <h3>📤 Upload Your Book (PDF)</h3>
      <input type="file" id="pdfFile" accept="application/pdf" style="margin:15px 0;">
      <button onclick="uploadPDF()" class="btn-primary">Upload & Convert to Audiobook</button>
    </div>

    <div class="card" id="player-section" style="display:none;">
      <h3>🎧 Now Playing</h3>
      <p id="book-title"></p>
      <button onclick="speakText()" class="btn-primary">▶️ Start Listening</button>
      <button onclick="pauseSpeech()" style="background:#eab308;">Pause</button>
      <button onclick="stopSpeech()" style="background:#ef4444;color:white;">Stop</button>
    </div>

    <div class="card">
      <h3>💬 Community Chat</h3>
      <button onclick="openChat()" class="btn-primary">Join Book Discussion</button>
    </div>
  </div>

  <script>
    // ================== YOUR CONFIG ==================
    const firebaseConfig = {
     apiKey: "AIzaSyAEytklQ_refpkStisgVb6Bv7wZrHW7bMg",
  authDomain: "echobooks-dc31b.firebaseapp.com",
  projectId: "echobooks-dc31b",
  storageBucket: "echobooks-dc31b.firebasestorage.app",
  messagingSenderId: "565405056470",
  appId: "1:565405056470:web:ab11970ea2c16452db3877",
  measurementId: "G-4X7V7088ZB"
    };
    // ================================================

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const storage = firebase.storage();

    let currentText = "";

    auth.onAuthStateChanged(user => {
      if (user) {
        document.getElementById("user-name").textContent = user.displayName || user.email;
        document.getElementById("welcome-name").textContent = user.displayName || "Reader";
        document.getElementById("user-info").style.display = "block";
      }
    });

    function googleLogin() {
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithPopup(provider);
    }

    function logout() {
      auth.signOut().then(() => location.reload());
    }

    async function uploadPDF() {
      const fileInput = document.getElementById("pdfFile");
      const file = fileInput.files[0];
      
      if (!file) return alert("Please select a PDF file");

      document.getElementById("book-title").textContent = "Processing " + file.name + "...";

      try {
        // Extract text from PDF
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
        let fullText = "";

        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const textContent = await page.getTextContent();
          fullText += textContent.items.map(item => item.str).join(" ") + "\n";
        }

        currentText = fullText.substring(0, 8000); // Limit for better TTS performance
        document.getElementById("player-section").style.display = "block";
        document.getElementById("book-title").textContent = file.name;

        alert("✅ Book processed successfully! Click 'Start Listening'");

      } catch (error) {
        alert("Error processing PDF: " + error.message);
      }
    }

    function speakText() {
      if (!currentText) return alert("No text available");
      
      const utterance = new SpeechSynthesisUtterance(currentText);
      utterance.rate = 0.95;
      utterance.pitch = 1;
      speechSynthesis.speak(utterance);
    }

    function pauseSpeech() {
      speechSynthesis.pause();
    }

    function stopSpeech() {
      speechSynthesis.cancel();
    }

    function openChat() {
      alert("💬 Community Chat (Real-time chat will be added in next step)");
    }
  </script>
</body>
</html>
