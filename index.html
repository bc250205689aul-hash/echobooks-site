<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EchoBooks</title>
  
  <!-- Firebase Scripts -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f8f9fa;
      text-align: center;
      padding: 50px;
    }
    .btn {
      display: block;
      width: 320px;
      margin: 12px auto;
      padding: 16px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }
    .google { background: #DB4437; }
    .apple  { background: #000; }
    .microsoft { background: #00A4EF; }
    .twitter { background: #1DA1F2; }
  </style>
</head>
<body>
  <h1>📖 EchoBooks</h1>
  <p>Sign in to continue</p>

  <button onclick="googleLogin()" class="btn google">Login with Google</button>
  <button onclick="appleLogin()" class="btn apple">Login with Apple</button>
  <button onclick="microsoftLogin()" class="btn microsoft">Login with Microsoft</button>
  <button onclick="twitterLogin()" class="btn twitter">Login with Twitter</button>

  <p id="status" style="margin-top:30px; font-weight:bold;"></p>

  <script>
// Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyAEytklQ_refpkStisgVb6Bv7wZrHW7bMg",
  authDomain: "echobooks-dc31b.firebaseapp.com",
  projectId: "echobooks-dc31b",
  storageBucket: "echobooks-dc31b.firebasestorage.app",
  messagingSenderId: "565405056470",
  appId: "1:565405056470:web:ab11970ea2c16452db3877",
  measurementId: "G-4X7V7088ZB"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
    // ===================================================================

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    function googleLogin() {
      console.log("Button clicked");
      const provider = new firebase.auth.GoogleAuthProvider();
      
      auth.signInWithPopup(provider)
        .then((result) => {
          document.getElementById("status").innerHTML = "✅ Login Successful! Welcome " + result.user.displayName;
          console.log("Success:", result.user.email);
        })
        .catch((error) => {
          console.error(error);
          document.getElementById("status").innerHTML = "❌ Error: " + error.message;
        });
    }

    function appleLogin() { alert("Apple Login - Will work after proper setup"); }
    function microsoftLogin() { alert("Microsoft Login - Will work after proper setup"); }
    function twitterLogin() { alert("Twitter Login - Will work after proper setup"); }
  </script>
</body>
</html>
